<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080C14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EstatePay</title>
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Root Layout ─────────────────────────────────────────────────────────
       By default, html and body take 100% viewport dimensions with a dark background.
       ─────────────────────────────────────────────────────────────────────── */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #05070C;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    body.production {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── App Content Container ────────────────────────────────────────────────
       Fills full screen natively.
       ─────────────────────────────────────────────────────────────────────── */
    .mobile-app-content {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #080C14;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    /* ── Desktop / Tablet (> 480px) ──────────────────────────────────────────
       Wraps the app in a realistic phone aspect card container centered in viewport.
       ─────────────────────────────────────────────────────────────────────── */
    @media (min-width: 481px) {
      .mobile-app-content {
        width: clamp(320px, 90vw, 430px);
        height: clamp(600px, 92dvh, 900px);
        border-radius: 28px;
        border: 1px solid #1E293B;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 30px rgba(99, 102, 241, 0.08);
      }
    }

    /* ── Very small phones (≤ 360px) — scale down typography slightly ────── */
    @media (max-width: 360px) {
      .mobile-app-content {
        font-size: 95%;
      }
    }
  </style>
</head>
<body class="production">

  <!-- Mobile App Content Area — populated by app.js against real Firebase -->
  <div class="mobile-app-content" id="mobile-app-root">
    <!-- Dynamically populated via app.js -->
  </div>

  <!-- Core JavaScript logic (real Firebase-backed production build) -->
  <script type="module" src="app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => window.lucide?.createIcons());
  </script>
</body>
</html>
